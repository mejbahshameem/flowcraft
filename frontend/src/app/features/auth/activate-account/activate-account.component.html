<div class="status-page">
  @if (loading()) {
    <mat-spinner diameter="48"></mat-spinner>
    <p>Activating your account...</p>
  } @else if (success()) {
    <mat-icon class="status-icon success">check_circle</mat-icon>
    <h2>Account Activated</h2>
    <p>Your account has been successfully activated. You can now sign in.</p>
    <a mat-flat-button routerLink="/login">Go to Login</a>
  } @else {
    <mat-icon class="status-icon error">error</mat-icon>
    <h2>Activation Failed</h2>
    <p>{{ errorMessage() }}</p>
    <a mat-flat-button routerLink="/register">Back to Register</a>
  }
</div>
