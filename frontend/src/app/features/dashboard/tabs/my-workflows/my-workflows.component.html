@if (loading()) {
  <div class="spinner-container">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
} @else if (workflows().length === 0) {
  <div class="empty-state">
    <mat-icon>note_add</mat-icon>
    <p>You have not created any workflows yet.</p>
  </div>
} @else {
  <table mat-table [dataSource]="workflows()" class="workflows-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let wf">
        <a class="wf-link" (click)="viewWorkflow(wf._id)">{{ wf.name }}</a>
      </td>
    </ng-container>

    <ng-container matColumnDef="up_votes">
      <th mat-header-cell *matHeaderCellDef>Upvotes</th>
      <td mat-cell *matCellDef="let wf">{{ wf.up_votes }}</td>
    </ng-container>

    <ng-container matColumnDef="down_votes">
      <th mat-header-cell *matHeaderCellDef>Downvotes</th>
      <td mat-cell *matCellDef="let wf">{{ wf.down_votes }}</td>
    </ng-container>

    <ng-container matColumnDef="followers">
      <th mat-header-cell *matHeaderCellDef>Followers</th>
      <td mat-cell *matCellDef="let wf">{{ wf.followers }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let wf">
        <button mat-icon-button (click)="editWorkflow(wf._id)" matTooltip="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button (click)="deleteWorkflow(wf)" matTooltip="Delete" class="delete-btn">
          <mat-icon>delete_outline</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
}
