@if (loading()) {
  <div class="spinner-container">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
} @else if (history().length === 0) {
  <div class="empty-state">
    <mat-icon>how_to_vote</mat-icon>
    <p>You have not voted on any workflows yet.</p>
  </div>
} @else {
  <table mat-table [dataSource]="history()" class="vote-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Workflow</th>
      <td mat-cell *matCellDef="let item">
        <a class="wf-link" (click)="viewWorkflow(item._id)">{{ item.name }}</a>
      </td>
    </ng-container>

    <ng-container matColumnDef="vote">
      <th mat-header-cell *matHeaderCellDef>Your Vote</th>
      <td mat-cell *matCellDef="let item">
        <span class="vote-badge" [class.upvote]="item.vote === 'up_vote'" [class.downvote]="item.vote === 'down_vote'">
          <mat-icon>{{ item.vote === 'up_vote' ? 'thumb_up' : 'thumb_down' }}</mat-icon>
          {{ item.vote === 'up_vote' ? 'Upvoted' : 'Downvoted' }}
        </span>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
}
