<mat-toolbar class="navbar">
  <a routerLink="/" class="brand">
    <mat-icon>hub</mat-icon>
    <span class="brand-text">FlowCraft</span>
  </a>

  <span class="spacer"></span>

  @if (isLoggedIn()) {
    <nav class="nav-actions">
      <a mat-button routerLink="/dashboard" routerLinkActive="active" class="nav-link">
        <mat-icon>dashboard</mat-icon>
        <span class="nav-label">Dashboard</span>
      </a>
      <a mat-button routerLink="/workflow/create" routerLinkActive="active" class="nav-link">
        <mat-icon>add_circle_outline</mat-icon>
        <span class="nav-label">Create</span>
      </a>
      <button class="avatar-btn" [matMenuTriggerFor]="userMenu" aria-label="Account menu">
        @if (user()?.avatar) {
          <img [src]="user()!.avatar" alt="Avatar" />
        } @else {
          <mat-icon>account_circle</mat-icon>
        }
      </button>
      <mat-menu #userMenu="matMenu">
        @if (user(); as u) {
          <div class="menu-header">{{ u.name }}</div>
        }
        <button mat-menu-item routerLink="/dashboard">
          <mat-icon>person</mat-icon>
          <span>Profile</span>
        </button>
        <button mat-menu-item (click)="onLogout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </nav>
  } @else {
    <button mat-button routerLink="/login" routerLinkActive="active">Login</button>
    <button mat-flat-button routerLink="/register" routerLinkActive="active">Sign Up</button>
  }
</mat-toolbar>
