<mat-card class="workflow-card" [routerLink]="['/workflow', getId()]">
  <mat-card-header>
    <mat-card-title>{{ getName() }}</mat-card-title>
    @if (getOwnerName()) {
      <mat-card-subtitle>by {{ getOwnerName() }}</mat-card-subtitle>
    }
  </mat-card-header>
  <mat-card-content>
    @if (getDescription()) {
      <p class="description">{{ getDescription() }}</p>
    }
    @if (getLocation()) {
      <div class="location">
        <mat-icon>location_on</mat-icon>
        <span>{{ getLocation() }}</span>
      </div>
    }
  </mat-card-content>
  <mat-card-actions align="end">
    <div class="vote-display">
      <mat-icon>thumb_up</mat-icon>
      <span>{{ getUpvotes() }}</span>
    </div>
  </mat-card-actions>
</mat-card>
